name: Frontend CI/CD (React)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 🔹 Checkout code
    - name: Checkout repository
      uses: actions/checkout@v4

    # 🔹 Setup Node.js
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: npm   # ✅ auto-detects package-lock.json

    # 🔹 Install dependencies
    - name: Install dependencies
      run: npm ci

    # 🔹 Lint
    - name: Run lint
      run: npm run lint

    # 🔹 Test
    - name: Run tests
      run: npm test

    # 🔹 Build
    - name: Build project
      run: npm run build

    # 🔹 Deploy (demo)
    - name: Deploy
      run: echo "Deploying React app..."
