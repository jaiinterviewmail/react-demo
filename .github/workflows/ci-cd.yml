name: CI/CD (lint, test, deploy)

on:
  push:
    branches: [ "main" ]   # trigger on push to main

permissions:
  contents: read

jobs:

  # 🔹 Single-job example: lint + test
  lint_test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- Frontend (Node) ----
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      # If you don't have tests, keep this as a no-op
      - name: Test
        working-directory: frontend
        run: npm test || echo "No tests configured"

  # 🔹 Separate job: backend build (runs in parallel)
 
  # 🔹 Deploy job (depends on previous jobs)
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint_test]   # wait for both

    steps:
      - name: Deploy (demo)
        run: echo "Deploying application..."
