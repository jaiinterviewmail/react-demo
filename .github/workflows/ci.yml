name: CI/CD Pipeline

on:
push:
branches:
- main

jobs:
build-test-deploy:
runs-on: ubuntu-latest
steps:
  - name: Checkout repo
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '18'

  - name: Install dependencies
    run: npm install

  - name: Run Linter
    run: npm run lint

  - name: Run Tests
    run: npm test

  - name: Deploy (only on main)
    if: github.ref == 'refs/heads/main'
    run: |
      echo "Deploying application..."
      # Replace with actual deploy command
      # Example: npm run deploy
```
